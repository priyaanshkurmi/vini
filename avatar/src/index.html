<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: transparent;
      overflow: hidden;
      width: 200px;
      height: 200px;
      cursor: grab;
    }
    body.dragging { cursor: grabbing; }
    canvas {
      display: block;
      background: transparent;
    }
  </style>
</head>
<body>
  <canvas id="c" width="200" height="200"></canvas>

  <script>
    const { ipcRenderer } = require('electron')

    const canvas = document.getElementById('c')
    const ctx    = canvas.getContext('2d')
    const CX     = 100  // center x
    const CY     = 105  // center y (slightly low so glow fits)

    // ── STATE ─────────────────────────────────────────────────────────────
    const state = {
      // Emotion from backend (0-100)
      happiness:  60,
      trust:      40,
      energy:     75,
      attachment: 20,

      // Animation state
      animState:  'idle',   // idle | listening | thinking | talking
      amplitude:  0,        // lip sync / pulse strength
      targetAmp:  0,

      // Physics
      breathe:    0,        // sine wave for idle breathing
      squishY:    1.0,      // vertical squish (1 = normal)
      squishX:    1.0,      // horizontal squish
      bounce:     0,        // vertical offset from bounce
      wobble:     0,        // rotation wobble

      // Eyes
      blinkT:     0,        // blink timer
      nextBlink:  3,        // seconds until next blink
      blinkVal:   0,        // 0 = open, 1 = closed
      lookX:      0,        // pupil x offset (-1 to 1)
      lookY:      0,        // pupil y offset
      targetLookX:0,
      targetLookY:0,
      nextLook:   2,        // seconds until next eye movement

      // Thinking dots
      thinkDot:   0,

      // Mood — derived from emotion
      mood: 'neutral',      // happy | neutral | sad | excited | thinking | surprised
    }

    // ── COLOUR PALETTE ─────────────────────────────────────────────────────
    // Each mood has a body colour, glow colour, pupil colour
    const MOODS = {
      happy:     { body: '#FFD166', glow: '#FFB347', pupil: '#8B4513', iris: '#FF8C00' },
      excited:   { body: '#FF6B9D', glow: '#FF4081', pupil: '#6B0030', iris: '#FF1493' },
      neutral:   { body: '#7EC8E3', glow: '#00AACC', pupil: '#1A3A4A', iris: '#0088BB' },
      thinking:  { body: '#A8DADC', glow: '#457B9D', pupil: '#1D3557', iris: '#457B9D' },
      sad:       { body: '#8896AB', glow: '#5C677D', pupil: '#2D3142', iris: '#5C677D' },
      surprised: { body: '#C77DFF', glow: '#9B5DE5', pupil: '#3D0060', iris: '#7B2FBE' },
    }

    // ── DERIVE MOOD FROM EMOTION ──────────────────────────────────────────
    function updateMood() {
      const h = state.happiness
      const e = state.energy
      if (state.animState === 'thinking') { state.mood = 'thinking'; return }
      if (h > 80 && e > 70)  { state.mood = 'excited';   return }
      if (h > 60)            { state.mood = 'happy';     return }
      if (h < 30)            { state.mood = 'sad';       return }
      state.mood = 'neutral'
    }

    // Current interpolated colours
    let currentHue = { ...MOODS.neutral }

    function lerpColor(a, b, t) {
      // Simple hex lerp via canvas
      const parse = hex => {
        const r = parseInt(hex.slice(1,3),16)
        const g = parseInt(hex.slice(3,5),16)
        const b = parseInt(hex.slice(5,7),16)
        return [r,g,b]
      }
      const [ar,ag,ab] = parse(a)
      const [br,bg,bb] = parse(b)
      const rr = Math.round(ar + (br-ar)*t)
      const rg = Math.round(ag + (bg-ag)*t)
      const rb = Math.round(ab + (bb-ab)*t)
      return `rgb(${rr},${rg},${rb})`
    }

    // ── DRAW ──────────────────────────────────────────────────────────────
    function draw(dt) {
      ctx.clearRect(0, 0, 200, 200)

      const mood  = MOODS[state.mood] || MOODS.neutral
      const amp   = state.amplitude

      // Breathing
      state.breathe += dt * (state.animState === 'talking' ? 8 : 1.2)
      const breatheScale = 1 + Math.sin(state.breathe) * 0.025

      // Body radius
      const R = 52 * breatheScale * state.squishX
      const RY = 52 * breatheScale * state.squishY

      // Bounce offset
      const by = state.bounce + CY

      // ── OUTER GLOW ────────────────────────────────────────────────────
      const glowSize = 72 + amp * 20
      const grd = ctx.createRadialGradient(CX, by, R*0.5, CX, by, glowSize)
      grd.addColorStop(0,   hexAlpha(mood.glow, 0.35))
      grd.addColorStop(0.5, hexAlpha(mood.glow, 0.12))
      grd.addColorStop(1,   hexAlpha(mood.glow, 0))
      ctx.beginPath()
      ctx.ellipse(CX, by, glowSize, glowSize * 0.95, 0, 0, Math.PI*2)
      ctx.fillStyle = grd
      ctx.fill()

      // ── BODY ──────────────────────────────────────────────────────────
      ctx.save()
      ctx.translate(CX, by)
      ctx.rotate(state.wobble)

      // Body gradient — lighter top, richer bottom
      const bodyGrd = ctx.createRadialGradient(-R*0.3, -RY*0.35, R*0.1, 0, 0, R*1.1)
      bodyGrd.addColorStop(0,   lighten(mood.body, 0.4))
      bodyGrd.addColorStop(0.5, mood.body)
      bodyGrd.addColorStop(1,   darken(mood.body, 0.25))

      ctx.beginPath()
      ctx.ellipse(0, 0, R, RY, 0, 0, Math.PI*2)
      ctx.fillStyle = bodyGrd
      ctx.fill()

      // Soft inner highlight (top-left)
      const hlGrd = ctx.createRadialGradient(-R*0.28, -RY*0.32, 0, -R*0.2, -RY*0.2, R*0.55)
      hlGrd.addColorStop(0,   'rgba(255,255,255,0.55)')
      hlGrd.addColorStop(0.6, 'rgba(255,255,255,0.08)')
      hlGrd.addColorStop(1,   'rgba(255,255,255,0)')
      ctx.beginPath()
      ctx.ellipse(0, 0, R, RY, 0, 0, Math.PI*2)
      ctx.fillStyle = hlGrd
      ctx.fill()

      ctx.restore()

      // ── EYES ──────────────────────────────────────────────────────────
      drawEyes(mood, R, by)

      // ── EXPRESSION DETAILS ────────────────────────────────────────────
      drawExpression(mood, R, by, amp)

      // ── SPEAKING RINGS ────────────────────────────────────────────────
      if (state.animState === 'talking' && amp > 0.05) {
        for (let i = 1; i <= 3; i++) {
          const ringR = R + 10 + i * 12 * amp
          const alpha = (0.4 - i * 0.1) * amp
          ctx.beginPath()
          ctx.arc(CX, by, ringR, 0, Math.PI*2)
          ctx.strokeStyle = hexAlpha(mood.glow, alpha)
          ctx.lineWidth   = 2.5 - i * 0.5
          ctx.stroke()
        }
      }

      // ── THINKING DOTS ─────────────────────────────────────────────────
      if (state.animState === 'thinking') {
        state.thinkDot += dt * 2.5
        for (let i = 0; i < 3; i++) {
          const dx    = CX + R + 10 + i * 14
          const dy    = by - R * 0.3
          const pulse = Math.sin(state.thinkDot - i * 0.8)
          const r2    = 4 + pulse * 2
          const a     = 0.4 + pulse * 0.4
          ctx.beginPath()
          ctx.arc(dx, dy, r2, 0, Math.PI*2)
          ctx.fillStyle = hexAlpha(mood.glow, a)
          ctx.fill()
        }
      }

      // ── LISTENING PULSE ───────────────────────────────────────────────
      if (state.animState === 'listening') {
        const pulse = (Math.sin(state.breathe * 3) + 1) * 0.5
        ctx.beginPath()
        ctx.arc(CX, by, R + 6 + pulse * 8, 0, Math.PI*2)
        ctx.strokeStyle = hexAlpha(mood.glow, 0.5 * pulse + 0.2)
        ctx.lineWidth   = 2
        ctx.stroke()
      }
    }

    function drawEyes(mood, R, by) {
      const blink  = state.blinkVal
      const lx     = state.lookX * 6
      const ly     = state.lookY * 4

      // Eye positions relative to center
      const eyes = [
        { x: CX - R * 0.32, y: by - R * 0.12 },
        { x: CX + R * 0.32, y: by - R * 0.12 },
      ]

      eyes.forEach(({ x, y }) => {
        const eyeR  = R * 0.28
        const openH = eyeR * (1 - blink)

        if (openH < 1) return  // fully closed

        // Eye white
        ctx.beginPath()
        ctx.ellipse(x, y, eyeR, openH, 0, 0, Math.PI*2)
        ctx.fillStyle = 'rgba(255,255,255,0.92)'
        ctx.fill()

        if (blink > 0.5) return  // half-closed, skip iris

        // Iris
        const irisR = eyeR * 0.62
        ctx.beginPath()
        ctx.ellipse(x + lx*0.5, y + ly*0.5, irisR, irisR*(1-blink*0.3), 0, 0, Math.PI*2)
        ctx.fillStyle = mood.iris
        ctx.fill()

        // Pupil
        const pupilR = irisR * 0.52
        // Dilate with excitement/happiness
        const dilate = 1 + (state.happiness - 50) / 200
        ctx.beginPath()
        ctx.ellipse(x + lx, y + ly, pupilR * dilate, pupilR * dilate * (1-blink*0.2), 0, 0, Math.PI*2)
        ctx.fillStyle = mood.pupil
        ctx.fill()

        // Eye shine
        ctx.beginPath()
        ctx.ellipse(x + lx - irisR*0.28, y + ly - irisR*0.28, irisR*0.22, irisR*0.22, 0, 0, Math.PI*2)
        ctx.fillStyle = 'rgba(255,255,255,0.85)'
        ctx.fill()
      })

      // Sad eyebrows (drooped inward)
      if (state.mood === 'sad') {
        eyes.forEach(({ x, y }, i) => {
          const dir = i === 0 ? 1 : -1
          ctx.beginPath()
          ctx.moveTo(x - R*0.22, y - R*0.38)
          ctx.quadraticCurveTo(x, y - R*0.48, x + R*0.22*dir*0.6, y - R*0.32)
          ctx.strokeStyle = hexAlpha(mood.pupil, 0.7)
          ctx.lineWidth   = 3
          ctx.lineCap     = 'round'
          ctx.stroke()
        })
      }

      // Excited eyebrows (raised)
      if (state.mood === 'excited' || state.mood === 'surprised') {
        eyes.forEach(({ x, y }) => {
          ctx.beginPath()
          ctx.moveTo(x - R*0.22, y - R*0.46)
          ctx.quadraticCurveTo(x, y - R*0.58, x + R*0.22, y - R*0.46)
          ctx.strokeStyle = hexAlpha(mood.pupil, 0.6)
          ctx.lineWidth   = 2.5
          ctx.lineCap     = 'round'
          ctx.stroke()
        })
      }
    }

    function drawExpression(mood, R, by, amp) {
      // Smile / mouth expression
      const mx = CX
      const my = by + R * 0.42

      if (state.mood === 'happy' || state.mood === 'excited') {
        // Big smile
        ctx.beginPath()
        ctx.moveTo(mx - R*0.32, my)
        ctx.quadraticCurveTo(mx, my + R*0.22, mx + R*0.32, my)
        ctx.strokeStyle = hexAlpha(mood.pupil, 0.6)
        ctx.lineWidth   = 3
        ctx.lineCap     = 'round'
        ctx.stroke()

        // Cheek blush
        ;[-1, 1].forEach(dir => {
          const bx = CX + dir * R * 0.55
          const brd = ctx.createRadialGradient(bx, my - R*0.05, 0, bx, my - R*0.05, R*0.28)
          brd.addColorStop(0,   'rgba(255,150,150,0.28)')
          brd.addColorStop(1,   'rgba(255,150,150,0)')
          ctx.beginPath()
          ctx.ellipse(bx, my - R*0.05, R*0.28, R*0.18, 0, 0, Math.PI*2)
          ctx.fillStyle = brd
          ctx.fill()
        })
      }

      if (state.mood === 'sad') {
        // Frown
        ctx.beginPath()
        ctx.moveTo(mx - R*0.28, my + R*0.08)
        ctx.quadraticCurveTo(mx, my - R*0.10, mx + R*0.28, my + R*0.08)
        ctx.strokeStyle = hexAlpha(mood.pupil, 0.55)
        ctx.lineWidth   = 3
        ctx.lineCap     = 'round'
        ctx.stroke()
      }

      if (state.mood === 'neutral' || state.mood === 'thinking') {
        // Flat line
        ctx.beginPath()
        ctx.moveTo(mx - R*0.22, my)
        ctx.lineTo(mx + R*0.22, my)
        ctx.strokeStyle = hexAlpha(mood.pupil, 0.45)
        ctx.lineWidth   = 2.5
        ctx.lineCap     = 'round'
        ctx.stroke()
      }

      if (state.mood === 'surprised') {
        // O mouth
        ctx.beginPath()
        ctx.ellipse(mx, my, R*0.14, R*0.18, 0, 0, Math.PI*2)
        ctx.fillStyle = hexAlpha(mood.pupil, 0.5)
        ctx.fill()
      }

      // Talking mouth — opens proportional to amplitude
      if (state.animState === 'talking' && amp > 0.05) {
        const openAmt = R * 0.16 * amp
        ctx.beginPath()
        ctx.ellipse(mx, my + openAmt*0.5, R*0.18 + amp*R*0.1, openAmt + 3, 0, 0, Math.PI*2)
        ctx.fillStyle = hexAlpha(mood.pupil, 0.55)
        ctx.fill()
      }
    }

    // ── ANIMATION LOOP ────────────────────────────────────────────────────
    let lastTime = performance.now()

    function loop(now) {
      requestAnimationFrame(loop)
      const dt = Math.min((now - lastTime) / 1000, 0.05)
      lastTime  = now

      // Smooth amplitude
      state.amplitude += (state.targetAmp - state.amplitude) * 0.2

      // Blink timer
      state.blinkT += dt
      if (state.blinkT >= state.nextBlink) {
        state.blinkT    = 0
        state.nextBlink = 2.5 + Math.random() * 4
        triggerBlink()
      }

      // Eye movement timer
      state.nextLook -= dt
      if (state.nextLook <= 0) {
        state.nextLook   = 1.5 + Math.random() * 3.5
        state.targetLookX = (Math.random() - 0.5) * 1.4
        state.targetLookY = (Math.random() - 0.5) * 0.8
      }
      state.lookX += (state.targetLookX - state.lookX) * dt * 4
      state.lookY += (state.targetLookY - state.lookY) * dt * 4

      // Bounce idle
      if (state.animState === 'idle') {
        state.bounce  = Math.sin(Date.now() * 0.0012) * 5
        state.wobble  = Math.sin(Date.now() * 0.0008) * 0.03
        state.squishX = 1.0
        state.squishY = 1.0
      }

      // Talking — pulse squish with amplitude
      if (state.animState === 'talking') {
        state.squishX = 1 + state.amplitude * 0.08
        state.squishY = 1 - state.amplitude * 0.06
        state.wobble  = Math.sin(Date.now() * 0.005) * state.amplitude * 0.05
        state.bounce  = Math.sin(Date.now() * 0.003) * state.amplitude * 4
      }

      // Listening — lean forward
      if (state.animState === 'listening') {
        state.wobble  = Math.sin(Date.now() * 0.001) * 0.04
        state.squishX = 1.0; state.squishY = 1.0
        state.bounce  = Math.sin(Date.now() * 0.0015) * 3
        state.targetLookX = 0; state.targetLookY = -0.3
      }

      // Thinking — look up-left
      if (state.animState === 'thinking') {
        state.targetLookX = -0.6
        state.targetLookY = -0.5
        state.bounce      = Math.sin(Date.now() * 0.001) * 2
      }

      updateMood()
      draw(dt)
    }

    // ── BLINK ─────────────────────────────────────────────────────────────
    function triggerBlink() {
      const dur   = 120
      const start = performance.now()
      function animBlink(now) {
        const p = (now - start) / dur
        if (p < 0.5) {
          state.blinkVal = p * 2
          requestAnimationFrame(animBlink)
        } else if (p < 1) {
          state.blinkVal = (1 - p) * 2
          requestAnimationFrame(animBlink)
        } else {
          state.blinkVal = 0
        }
      }
      requestAnimationFrame(animBlink)
    }

    // ── WEBSOCKET ─────────────────────────────────────────────────────────
    function connectWS() {
      const ws = new WebSocket('ws://localhost:8000/ws/avatar')
      ws.onopen = () => console.log('WS connected')
      ws.onmessage = (e) => {
        try {
          const d = JSON.parse(e.data)
          if (d.type === 'heartbeat' && d.emotion) {
            state.happiness  = d.emotion.happiness
            state.trust      = d.emotion.trust
            state.energy     = d.emotion.energy
            state.attachment = d.emotion.attachment
          }
          if (d.amplitude !== undefined) state.targetAmp = d.amplitude
          if (d.animation)  state.animState = d.animation
          if (d.type === 'idle') state.animState = 'idle'
        } catch(_) {}
      }
      ws.onclose = () => setTimeout(connectWS, 3000)
      ws.onerror = () => {}
    }
    connectWS()

    // ── DRAG TO MOVE ──────────────────────────────────────────────────────
    let dragging = false
    let dragStartX, dragStartY

    canvas.addEventListener('mousedown', (e) => {
      dragging   = true
      dragStartX = e.screenX
      dragStartY = e.screenY
      document.body.classList.add('dragging')
    })

    window.addEventListener('mousemove', (e) => {
      if (!dragging) return
      const dx = e.screenX - dragStartX
      const dy = e.screenY - dragStartY
      dragStartX = e.screenX
      dragStartY = e.screenY

      // Get current window position and move it
      const { remote } = require('electron')
      const win = remote?.getCurrentWindow?.()
      if (win) {
        const [wx, wy] = win.getPosition()
        win.setPosition(wx + dx, wy + dy)
      } else {
        ipcRenderer.send('move-window-delta', { dx, dy })
      }
    })

    window.addEventListener('mouseup', () => {
      dragging = false
      document.body.classList.remove('dragging')
    })

    // ── HELPERS ───────────────────────────────────────────────────────────
    function hexAlpha(hex, alpha) {
      const r = parseInt(hex.slice(1,3),16)
      const g = parseInt(hex.slice(3,5),16)
      const b = parseInt(hex.slice(5,7),16)
      return `rgba(${r},${g},${b},${alpha})`
    }

    function lighten(hex, amt) {
      const r = Math.min(255, parseInt(hex.slice(1,3),16) + 255*amt)
      const g = Math.min(255, parseInt(hex.slice(3,5),16) + 255*amt)
      const b = Math.min(255, parseInt(hex.slice(5,7),16) + 255*amt)
      return `rgb(${Math.round(r)},${Math.round(g)},${Math.round(b)})`
    }

    function darken(hex, amt) {
      const r = Math.max(0, parseInt(hex.slice(1,3),16) - 255*amt)
      const g = Math.max(0, parseInt(hex.slice(3,5),16) - 255*amt)
      const b = Math.max(0, parseInt(hex.slice(5,7),16) - 255*amt)
      return `rgb(${Math.round(r)},${Math.round(g)},${Math.round(b)})`
    }

    // Start
    requestAnimationFrame(loop)
  </script>
</body>
</html>
