<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: transparent;
      overflow: hidden;
      width: 200px;
      height: 200px;
      cursor: grab;
    }
    body.dragging { cursor: grabbing; }
    canvas {
      display: block;
      background: transparent;
    }
  </style>
</head>
<body>
  <canvas id="c" width="200" height="200"></canvas>

  <script src="../build/renderer.js"></script>
  <script>
      // Talking — pulse squish with amplitude
      if (state.animState === 'talking') {
        state.squishX = 1 + state.amplitude * 0.08
        state.squishY = 1 - state.amplitude * 0.06
        state.wobble  = Math.sin(Date.now() * 0.005) * state.amplitude * 0.05
        state.bounce  = Math.sin(Date.now() * 0.003) * state.amplitude * 4
      }

      // Listening — lean forward
      if (state.animState === 'listening') {
        state.wobble  = Math.sin(Date.now() * 0.001) * 0.04
        state.squishX = 1.0; state.squishY = 1.0
        state.bounce  = Math.sin(Date.now() * 0.0015) * 3
        state.targetLookX = 0; state.targetLookY = -0.3
      }

      // Thinking — look up-left
      if (state.animState === 'thinking') {
        state.targetLookX = -0.6
        state.targetLookY = -0.5
        state.bounce      = Math.sin(Date.now() * 0.001) * 2
      }

      updateMood()
      draw(dt)
    

    // ── BLINK ─────────────────────────────────────────────────────────────
    function triggerBlink() {
      const dur   = 120
      const start = performance.now()
      function animBlink(now) {
        const p = (now - start) / dur
        if (p < 0.5) {
          state.blinkVal = p * 2
          requestAnimationFrame(animBlink)
        } else if (p < 1) {
          state.blinkVal = (1 - p) * 2
          requestAnimationFrame(animBlink)
        } else {
          state.blinkVal = 0
        }
      }
      requestAnimationFrame(animBlink)
    }

    // ── WEBSOCKET ─────────────────────────────────────────────────────────
    function connectWS() {
      const ws = new WebSocket('ws://localhost:8000/ws/avatar')
      ws.onopen = () => console.log('WS connected')
      ws.onmessage = (e) => {
        try {
          const d = JSON.parse(e.data)
          if (d.type === 'heartbeat' && d.emotion) {
            state.happiness  = d.emotion.happiness
            state.trust      = d.emotion.trust
            state.energy     = d.emotion.energy
            state.attachment = d.emotion.attachment
          }
          if (d.amplitude !== undefined) state.targetAmp = d.amplitude
          if (d.animation)  state.animState = d.animation
          if (d.type === 'idle') state.animState = 'idle'
        } catch(_) {}
      }
      ws.onclose = () => setTimeout(connectWS, 3000)
      ws.onerror = () => {}
    }
    connectWS()

    // ── DRAG TO MOVE ──────────────────────────────────────────────────────
    let dragging = false
    let dragStartX, dragStartY

    canvas.addEventListener('mousedown', (e) => {
      dragging   = true
      dragStartX = e.screenX
      dragStartY = e.screenY
      document.body.classList.add('dragging')
    })

    window.addEventListener('mousemove', (e) => {
      if (!dragging) return
      const dx = e.screenX - dragStartX
      const dy = e.screenY - dragStartY
      dragStartX = e.screenX
      dragStartY = e.screenY

      // Get current window position and move it
      const { remote } = require('electron')
      const win = remote?.getCurrentWindow?.()
      if (win) {
        const [wx, wy] = win.getPosition()
        win.setPosition(wx + dx, wy + dy)
      } else {
        ipcRenderer.send('move-window-delta', { dx, dy })
      }
    })

    window.addEventListener('mouseup', () => {
      dragging = false
      document.body.classList.remove('dragging')
    })

    // ── HELPERS ───────────────────────────────────────────────────────────
    function hexAlpha(hex, alpha) {
      const r = parseInt(hex.slice(1,3),16)
      const g = parseInt(hex.slice(3,5),16)
      const b = parseInt(hex.slice(5,7),16)
      return `rgba(${r},${g},${b},${alpha})`
    }

    function lighten(hex, amt) {
      const r = Math.min(255, parseInt(hex.slice(1,3),16) + 255*amt)
      const g = Math.min(255, parseInt(hex.slice(3,5),16) + 255*amt)
      const b = Math.min(255, parseInt(hex.slice(5,7),16) + 255*amt)
      return `rgb(${Math.round(r)},${Math.round(g)},${Math.round(b)})`
    }

    function darken(hex, amt) {
      const r = Math.max(0, parseInt(hex.slice(1,3),16) - 255*amt)
      const g = Math.max(0, parseInt(hex.slice(3,5),16) - 255*amt)
      const b = Math.max(0, parseInt(hex.slice(5,7),16) - 255*amt)
      return `rgb(${Math.round(r)},${Math.round(g)},${Math.round(b)})`
    }

    // Start
    requestAnimationFrame(loop)
  </script>
</body>
</html>
